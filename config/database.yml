default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>

development:
  <<: *default
  database: <%= ENV['DB_DATABASE'] || 'ecf_game_development' %>

test:
  <<: *default
  database: <%= ENV['DB_TEST_DATABASE'] || 'ecf_game_test' %>

production:
  <<: *default
  database: <%= ENV['DB_DATABASE'] %>